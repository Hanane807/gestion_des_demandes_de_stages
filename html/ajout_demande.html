<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des demandes de stages</title>
    <link rel="stylesheet" href="../css/new_demande.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <button onclick="location.href = '../php/etudiant_dashboard.php'" class="retour"><i class='bx bx-left-arrow-alt'></i></button>
    <div>
        <form action="../php/new_demande.php" method="post" enctype="multipart/form-data">
            <label for="filiere">Filiére</label>
            <input type="text" name="filiere" id="filiere" required>
            <label for="niveau">Niveau</label>
            <input type="text" id="niveau" name="niveau" required>
            <label for="dd">Date de début</label>
            <input type="date" id="dd" name="dd" required>
            <label for="df">Date de fin</label>
            <input type="date" id="df" name="df" required>
            <label for="cv">CV</label>
            <input type="file" id="cv" name="cv" required>
            <label for="lm">Lettre de motivation</label>
            <input type="file" id="lm" name="lm" required>
            <button type="submit">Enregistrer</button>
        </form>
    </div>
</body>
</html>
