<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>étudiant formulaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/etudiant_form.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .step{
            display: none;
        }
        .step.active{
            display: block;
        }
    </style>
    
</head>
<body>
    <div class="container">

        <button class="btn2" onclick="location.href='../html/premier_inerface.html';">
            <i class='bx bxs-home'></i>
        </button> 
        
        <span class="bg-animat"></span>
        <span class="bg-animat2"></span>

        <div class="form-box login">
            <h2>Connexion</h2>
            <form action="../php/etudiant_form_login.php" method="post">
                <div class="input-box">
                    <input type="email" name="email" required>
                    <label >Email</label>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" name="mdp" required>
                    <label >Mot de passe</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Connexion</button>
                <div class="lien-container">
                    <p>Vous n'avez pas une demande? <a href="#" onclick="connexion(event)" class="lien-inscription">Demander</a></p>
                </div>
            </form>
        </div>
        <div class="info-text login">
            <img src="../images/CHU_logo-removebg-preview.png" alt="">
            <h2>Bienvenue <br> dans l’espace stagiaire.</h2>
        </div>


        <div class="form-box registre">
            <h2>Inscrire</h2>
            <form action="../php/etudiant_form_registre.php" method="post" enctype="multipart/form-data">
                <div class="step active">
                    <div class="input-box">
                        <input type="text" required name="nom">
                        <label >Nom complet</label>
                        <i class='bx bxs-user'></i>
                    </div>
                    <div class="input-box">
                        <input type="email" required name="email">
                        <label >Email</label>
                        <i class='bx bxs-envelope'></i>
                    </div>
                    <div class="input-box">
                        <input type="password" required  name="mdp">
                        <label >Mot de passe</label>
                        <i class='bx bxs-lock-alt'></i>
                    </div>
                    <button type="button" class="btn-suiv pr" onclick="nextStep()">Suivant</button>
                    <div class="lien-container" style="margin-top: 10px;">
                    <p>Vous avez déjà une demande? <a href="#" onclick="connexion(event)" class="lien-inscription">Se connecter</a></p>
                    </div>
                </div>
                <div class="step">
                    <div class="input-box">
                        <input type="text" required name="filiere">
                        <label for="">Filière</label>     
                    </div>
                    <div class="input-box">
                        <input type="text" required name="niveau">
                        <label for="">Niveau</label>
                    </div>
                    <div class="input-box">
                        <input type="file" required name="cv" placeholder="Entrer ton CV">
                        
                    </div>
                    <button type="button" onclick="prevStep()" class="btn-prev">Retour</button>
                    <button type="button" class="btn-suiv sc" onclick="nextStep()">Suivant</button>
                </div>
                <div class="step">
                    <div class="input-box">
                        <input type="text" required name="DDebut" placeholder="                        YYYY/MM/JJ">
                        <label for="">Date de début</label>     
                    </div>
                    <div class="input-box">
                        <input type="text" required name="DFin" placeholder="                   YYYY/MM/JJ">
                        <label for="">Date de fin</label>
                    </div>
                    <div class="input-box">
                        <input type="file" name="LMotiv">
                        <label for="">Lettre de motivation</label>
                    </div>
                    <button type="button" onclick="prevStep()" class="btn-prev">Retour</button>
                    <button type="submit" class="btn-insc">Soumettre</button>
                </div>
                <script src="../js/etudiant_form.js"></script>
            </form>
        </div>
        <div class="info-text registre">
            <img src="../images/CHU_logo-removebg-preview.png" alt="">
            <h2>Bienvenue  dans l’espace stagiaire.</h2>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
